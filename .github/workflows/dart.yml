name: Dart CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
      - feature
      - feature/**
      - unit
  push:
    branches:
      - main
      - unit
      - unit/**

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Run tests with coverage
        run: flutter test --coverage=coverage

      - name: Install coverage tools
        run: flutter pub global activate coverage

      - name: Convert coverage
        run: |
          format_coverage \
            --lcov \
            --in=coverage \
            --out=coverage/lcov.info \
            --report-on=lib

      - name: Check coverage >= 80%
        run: |
          COVERAGE=$(grep -o 'LF:[0-9]*' coverage/lcov.info | cut -d: -f2 | paste -sd+ | bc)
          HIT=$(grep -o 'LH:[0-9]*' coverage/lcov.info | cut -d: -f2 | paste -sd+ | bc)
          PERCENT=$((100 * HIT / COVERAGE))

          echo "Coverage: $PERCENT%"

          if [ "$PERCENT" -lt 80 ]; then
            echo "Coverage below 80%"
            exit 1
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info

      - name: Pub publish check
        run: dart pub publish --dry-run
