name: Dart CI

on:
  pull_request:
    branches:
      - main
      - features/**
  push:
    branches:
      - main
      - unit/**

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Run tests with coverage
        run: dart test --coverage=coverage

      - name: Install coverage tool
        run: dart pub global activate coverage

      - name: Format coverage
        run: format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib

      - name: Enforce coverage >= 80%
        run: |
          COVERAGE=$(grep -o 'LF:[0-9]*' coverage/lcov.info | cut -d: -f2 | paste -sd+ | bc)
          HIT=$(grep -o 'LH:[0-9]*' coverage/lcov.info | cut -d: -f2 | paste -sd+ | bc)
          PERCENT=$((100 * HIT / COVERAGE))

          echo "Coverage: $PERCENT%"

          if [ "$PERCENT" -lt 80 ]; then
            echo "Coverage below 80%"
            exit 1
          fi
