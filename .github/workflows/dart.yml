name: Dart CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
      - feature
      - feature/**
      - unit
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - unit
      - unit/**

permissions:
  contents: read
  pull-requests: write

jobs:
  commit-check:
    if: github.event_name == 'pull_request'
    name: Conventional Commit Validation
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality-check:
    name: Format, Lint, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project
        run: dart analyze --fatal-warnings

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        id: coverage
        run: |
          sudo apt-get update
          sudo apt-get install -y bc

          TOTAL_LINES=$(grep -Po 'LF:\K\d+' coverage/lcov.info | paste -sd+ | bc)
          COVERED_LINES=$(grep -Po 'LH:\K\d+' coverage/lcov.info | paste -sd+ | bc)

          if [ "$TOTAL_LINES" -eq 0 ]; then
            echo "No coverage data found!"
            exit 1
          fi

          PERCENT=$((100 * COVERED_LINES / TOTAL_LINES))
          echo "Coverage is $PERCENT%"

          echo "percent=$PERCENT" >> $GITHUB_OUTPUT

          if [ "$PERCENT" -lt 80 ]; then
            echo "Coverage is below 80%"
            exit 1
          fi

      - name: Debug coverage file
        run: head -50 coverage/lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info

      - name: Comment PR with summary
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          message: |
            ### ✅ CI Quality Gate Passed
            - 🧹 Formatting: Passed
            - 🔍 Lint: Passed
            - 🧪 Tests: Passed
            - 📊 Coverage: ${{ steps.coverage.outputs.percent }}%
