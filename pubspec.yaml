name: flutter_test_gen
description: A CLI tool to automatically generate Flutter and Dart unit tests. Generates structured test templates for classes and functions to speed up Flutter testing.
version: 0.0.3
repository: https://github.com/braglath/flutter_test_gen.git
homepage: https://github.com/yourusername/flutter_test_gen

environment:
  sdk: ">=3.0.0 <4.0.0"

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

topics:
  - testing
  - unit-tests
  - test-generation
  - cli
  - code-generation

dependencies:
  analyzer: ">=6.0.0 <11.0.0"
  ansi_styles: ^0.3.2+1
  yaml: ^3.1.3

executables:
  flutter_test_gen:
  ftg: flutter_test_gen

dev_dependencies:
  lints: ^6.0.0
  mocktail: ^1.0.0
  test: ^1.25.6
